services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: toybola-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: toybola_user
      POSTGRES_PASSWORD: toybola_pass
      POSTGRES_DB: toybola_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - toybola-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toybola_user -d toybola_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: toybola-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - toybola-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: toybola-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - toybola-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  toybola-network:
    driver: bridge
