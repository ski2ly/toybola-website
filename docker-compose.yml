services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: toybola-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-toybola_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toybola_pass}
      POSTGRES_DB: ${POSTGRES_DB:-toybola_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toybola_user} -d ${POSTGRES_DB:-toybola_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: toybola-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
